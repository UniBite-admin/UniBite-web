<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PopBite Bite Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body { font-family: system-ui; margin: 0; padding: 16px;
           background: linear-gradient(#B6D0E2, #7F9CE0); }
    .container { max-width: 700px; margin: 0 auto; }
    .card { background: white; padding: 16px; border-radius: 12px;
            margin-bottom: 16px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .blur { backdrop-filter: blur(6px); background: rgba(255,255,255,0.6);
            position: absolute; inset: 0; border-radius: 12px; }
  </style>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://qxcofmbryadnwknjgflh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4Y29mbWJyeWFkbndrbmpnZmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyNDAxNjUsImV4cCI6MjA3MTgxNjE2NX0.qf7gsas6C7IUdwcXDV8642UMx67Afv54bizzQQ4o3rk"
    );

    const params = new URLSearchParams(window.location.search);
    const biteId = params.get("bite");

    async function load() {
      if (!biteId) return;

      const { data } = await supabase
        .from("pb_profiles")
        .select("*")
        .eq("pop_bite_id", biteId)
        .maybeSingle();

      if (!data) return;

      const c = document.getElementById("content");

      function add(title, text, blurred = false) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h2>${title}</h2><p>${text}</p>`;
        if (blurred) {
          const blur = document.createElement("div");
          blur.className = "blur";
          card.appendChild(blur);
        }
        c.appendChild(card);
      }

      add(data.title1, data.slide1);
      add(data.title2, data.slide2);
      add(data.title3, data.slide3);
      add(data.title4, data.slide4, true);
      add(data.title5, data.slide5, true);
      add(data.title6, data.slide6, true);
    }

    load();
  </script>
</head>

<body>
  <div class="container">
    <h1 style="text-align:center; color:#23395D;">PopBite Preview</h1>
    <div id="content">Loading...</div>

    https://play.google.com/store/apps/details?id=com.unibite.popbite
      Get PopBite on Google Play
    </a>
  </div>
</body>
</html>
