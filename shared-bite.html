<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PopBite – Bite Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Basic look & feel -->
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Roboto", sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(#B6D0E2, #7F9CE0);
      color: #333;
      overflow-x: hidden;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding-top: 70px; /* space for CTA button */
    }

    /* CTA button at top */
    .cta {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
    }

    .install-button {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 30px;
      background: #7F9CE0;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    /* Slider wrapper */
    .slider {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 16px;
      padding: 0 16px;
    }

    .slide {
  flex: 0 0 90%;
  scroll-snap-align: center;
  background: white;
  border-radius: 20px;
  padding: 24px;
  position: relative;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);

  /* NEW: auto height */
  min-height: auto;

  /* NEW: center card content vertically on larger screens */
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

    .slide h2 {
      margin-top: 0;
      font-size: 20px;
      font-weight: 700;
      color: #23395D;
    }

    .slide p {
      font-size: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    /* BLURRED SLIDES (4,5,6) */
  .locked-blur {
  filter: blur(3px);        /* less blur */
  opacity: 0.55;            /* more readable background */
  pointer-events: none;
}

.title-readable {
  filter: none !important;
  opacity: 1 !important;
}


    .title-readable {
      filter: none !important;
      opacity: 1 !important;
      position: relative;
      z-index: 2;
    }

    /* Lock overlay */
    .overlay-lock {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      background: rgba(255,255,255,0.6);
      z-index: 3;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      color: #23395D;
    }
  </style>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://qxcofmbryadnwknjgflh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4Y29mbWJyeWFkbndrbmpnZmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyNDAxNjUsImV4cCI6MjA3MTgxNjE2NX0.qf7gsas6C7IUdwcXDV8642UMx67Afv54bizzQQ4o3rk"
    );

    function getParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    async function loadBite(biteId) {
      const { data, error } = await supabase
        .from("pb_profiles")
        .select(`
          subtopic,
          title1, slide1,
          title2, slide2,
          title3, slide3,
          title4, slide4,
          title5, slide5,
          title6, slide6
        `)
        .eq("pop_bite_id", biteId)
        .maybeSingle();

      if (!data) {
        document.getElementById("slider").innerHTML =
          "<p style='padding:20px;color:white;'>Could not load bite.</p>";
        return;
      }

      renderSlides(data);
    }

    function renderSlides(bite) {
      const slider = document.getElementById("slider");

      const slides = [
        { title: bite.title1, body: bite.slide1, locked: false },
        { title: bite.title2, body: bite.slide2, locked: false },
        { title: bite.title3, body: bite.slide3, locked: false },
        { title: bite.title4, body: bite.slide4, locked: true },
        { title: bite.title5, body: bite.slide5, locked: true },
        { title: bite.title6, body: bite.slide6, locked: true },
      ];

      slides.forEach((s) => {
        const div = document.createElement("div");
        div.className = "slide";

        // Title ALWAYS readable
        const title = document.createElement("h2");
        title.className = s.locked ? "title-readable" : "";
        title.textContent = s.title;
        div.appendChild(title);

        const text = document.createElement("p");
        text.textContent = s.body;
        if (s.locked) text.className = "locked-blur";
        div.appendChild(text);

        // Overlay lock for S4-S6
        if (s.locked) {
          const overlay = document.createElement("div");
          overlay.className = "overlay-lock";
overlay.innerHTML = `
  <a class="overlay-btn" href="https://play.google.com/store/apps/details?id=com.unibite.popbite">
    Install PopBite to unlock full slides
  </a>
`;
.overlay-btn {
  background: #7F9CE0;
  color: #fff;
  padding: 10px 20px;
  border-radius: 24px;
  text-decoration: none;
  font-weight: 600;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  font-size: 14px;
}
          div.appendChild(overlay);
        }

        slider.appendChild(div);
      });
    }

    window.onload = () => {
      const biteId = getParam("bite");
      if (biteId) loadBite(biteId);
    };
  </script>
</head>

<body>
  <!-- CTA button on top -->
  <div class="cta">
    https://play.google.com/store/apps/details?id=com.unibite.popbite
      Install PopBite on Google Play
    </a>
  </div>

  <div class="container">
    <!-- HORIZONTAL SLIDER -->
    <div id="slider" class="slider">
      <!-- Slides injected here -->
    </div>
  </div>
</body>
</html>
