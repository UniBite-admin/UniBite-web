<!DOCTYPE html>< <meta charset="UTF-8" />
  <title>PopBite – Bite Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Roboto", sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(#B6D0E2, #7F9CE0);
      overflow-x: hidden;
      min-height: 100vh;
    }

    .container {
      max-width: 700px;
      margin: 40px auto 40px auto;
      padding-top: 20px;
    }

    /* Horizontal slider */
    .slider {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 20px;
      padding: 0 20px;
    }

    /* Card */
    .slide {
      flex: 0 0 90%;
      scroll-snap-align: center;
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      position: relative;
    }

    .slide h2 {
      margin-top: 0;
      font-size: 20px;
      font-weight: 700;
      color: #23395D;
    }

    .slide p {
      font-size: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      margin: 0;
    }

    /* BODY blur */
    .locked-body {
      filter: blur(4px);
      opacity: 0.55;
    }

    /* TITLE slight blur */
    .locked-title {
      filter: blur(0.01px);
      opacity: 0.85;
    }

    /* overlay */
    .overlay-lock {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(4px);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay-btn {
      background: #7F9CE0;
      color: white;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 24px;
      font-weight: 600;
      font-size: 15px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.25);
    }

    /* Dots */
    .dots {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      transition: background 0.25s, transform 0.25s;
    }

    .dot.active {
      background: #23395D;
      transform: scale(1.25);
    }
    
    .logo {
      display: block;
      width: 140px;
      margin: 0 auto 24px auto;
    }

  </style>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://qxcofmbryadnwknjgflh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4Y29mbWJyeWFkbndrbmpnZmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyNDAxNjUsImV4cCI6MjA3MTgxNjE2NX0.qf7gsas6C7IUdwcXDV8642UMx67Afv54bizzQQ4o3rk"
    );

    function getParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    async function loadBite(id) {
      const { data } = await supabase
        .from("pb_profiles")
        .select(`
          subtopic,
          title1, slide1,
          title2, slide2,
          title3, slide3,
          title4, slide4,
          title5, slide5,
          title6, slide6
        `)
        .eq("pop_bite_id", id)
        .maybeSingle();

      if (!data) {
        document.getElementById("slider").innerHTML =
          "<p style='padding:20px;color:white;'>Could not load PopBite.</p>";
        return;
      }

      renderSlides(data);
    }

    function renderSlides(bite) {
      const sliderEl = document.getElementById("slider");

      const SLIDES = [
        { title: bite.title1, body: bite.slide1, locked: false },
        { title: bite.title2, body: bite.slide2, locked: false },
        { title: bite.title3, body: bite.slide3, locked: false },
        { title: bite.title4, body: bite.slide4, locked: true },
        { title: bite.title5, body: bite.slide5, locked: true },
        { title: bite.title6, body: bite.slide6, locked: true },
      ];

      SLIDES.forEach((s) => {
        const card = document.createElement("div");
        card.className = "slide";

        const title = document.createElement("h2");
        title.textContent = s.title;
        if (s.locked) title.className = "locked-title";
        card.appendChild(title);

        const body = document.createElement("p");
        body.textContent = s.body;
        if (s.locked) body.className = "locked-body";
        card.appendChild(body);

        if (s.locked) {
          const overlay = document.createElement("div");
          overlay.className = "overlay-lock";

          const btn = document.createElement("a");
          btn.href = "https://play.google.com/store/apps/details?id=com.unibite.popbite";
          btn.className = "overlay-btn";
          btn.textContent = "Install PopBite to unlock full slides";

          overlay.appendChild(btn);
          card.appendChild(overlay);
        }

        sliderEl.appendChild(card);
      });

      // Create dots
      const dotsContainer = document.getElementById("dots");
      dotsContainer.innerHTML = "";

      SLIDES.forEach((_, i) => {
        const d = document.createElement("div");
        d.className = "dot" + (i === 0 ? " active" : "");
        dotsContainer.appendChild(d);
      });

      // Update dots
      sliderEl.addEventListener("scroll", () => {
        const slideWidth = sliderEl.children[0].offsetWidth + 20;
        const index = Math.round(sliderEl.scrollLeft / slideWidth);

        const dots = dotsContainer.querySelectorAll(".dot");
        dots.forEach((dot, i) => {
          if (i === index) dot.classList.add("active");
          else dot.classList.remove("active");
        });
      });
    }

    window.onload = () => {
      const id = getParam("bite");
      if (id) loadBite(id);
    };
  </script>
</head>

<body>

  <div class="container">
    <!-- PopBite Logo -->
    <img src="assets/popbite-logo.png" class="logo" alt="PopBite Logo" />
   
    <div id="slider" class="slider"></div>

    <!-- Slide dots -->
    <div id="dots" class="dots"></div>
  </div>

</body>
</html>
