<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PopBite – Bite Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Roboto", sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(#B6D0E2, #7F9CE0);
      color: #333;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding-top: 90px; /* space for CTA */
      padding-bottom: 40px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* CTA button pinned at top */
    .cta {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
    }

    .install-button {
      display: inline-block;
      padding: 12px 26px;
      border-radius: 28px;
      background: #7F9CE0;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.18);
    }

    /* Horizontal slider */
    .slider {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 20px;
      padding: 0 20px;
    }

    /* Slide card */
    .slide {
      flex: 0 0 90%;
      scroll-snap-align: center;
      background: white;
      border-radius: 20px;
      padding: 24px;
      position: relative;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .slide h2 {
      margin: 0 0 12px 0;
      font-size: 20px;
      font-weight: 700;
      color: #23395D;
    }

    .slide p {
      font-size: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      margin: 0;
    }

    /* BODY blur for locked slides */
    .locked-blur {
      filter: blur(3px);
      opacity: 0.50;
      pointer-events: none;
    }

    /* Title ALWAYS readable */
    .title-readable {
      filter: none !important;
      opacity: 1 !important;
      position: relative;
      z-index: 2;
    }

    /* Lock overlay with button */
    .overlay-lock {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      background: rgba(255,255,255,0.65);
      z-index: 3;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
    }

    .overlay-btn {
      background: #7F9CE0;
      color: #fff;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 24px;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      font-size: 15px;
      display: inline-block;
    }
  </style>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://qxcofmbryadnwknjgflh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4Y29mbWJyeWFkbndrbmpnZmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyNDAxNjUsImV4cCI6MjA3MTgxNjE2NX0.qf7gsas6C7IUdwcXDV8642UMx67Afv54bizzQQ4o3rk"
    );

    function getParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    async function loadBite(biteId) {
      const { data, error } = await supabase
        .from("pb_profiles")
        .select(`
          subtopic,
          title1, slide1,
          title2, slide2,
          title3, slide3,
          title4, slide4,
          title5, slide5,
          title6, slide6
        `)
        .eq("pop_bite_id", biteId)
        .maybeSingle();

      if (!data) {
        document.getElementById("slider").innerHTML =
          "<p style='color:white;padding:20px;text-align:center;'>Could not load PopBite.</p>";
        return;
      }

      renderSlides(data);
    }

    function renderSlides(bite) {
      const slider = document.getElementById("slider");

      const slides = [
        { title: bite.title1, body: bite.slide1, locked: false },
        { title: bite.title2, body: bite.slide2, locked: false },
        { title: bite.title3, body: bite.slide3, locked: false },
        { title: bite.title4, body: bite.slide4, locked: true },
        { title: bite.title5, body: bite.slide5, locked: true },
        { title: bite.title6, body: bite.slide6, locked: true },
      ];

      slides.forEach((s) => {
        const card = document.createElement("div");
        card.className = "slide";

        const title = document.createElement("h2");
        title.textContent = s.title;
        if (s.locked) title.className = "title-readable";
        card.appendChild(title);

        const text = document.createElement("p");
        text.textContent = s.body;
        if (s.locked) text.className = "locked-blur";
        card.appendChild(text);

        if (s.locked) {
          const overlay = document.createElement("div");
          overlay.className = "overlay-lock";

          overlay.innerHTML = `
            https://play.google.com/store/apps/details?id=com.unibite.popbite
              Install PopBite to unlock full slides
            </a>
          `;

          card.appendChild(overlay);
        }

        slider.appendChild(card);
      });
    }

    window.onload = () => {
      const biteId = getParam("bite");
      if (biteId) loadBite(biteId);
    };
  </script>
</head>

<body>
  <!-- CTA button fixed on top -->
  <div class="cta">
    https://play.google.com/store/apps/details?id=com.unibite.popbite
      Install PopBite on Google Play
    </a>
  </div>

  <div class="container">
    <div id="slider" class="slider">
      <!-- Slides injected here -->
    </div>
  </div>
</body>
</html>
